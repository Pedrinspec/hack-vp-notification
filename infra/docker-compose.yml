# =============================================================================
# hack-vp-notification — Docker Compose
# Orquestra: notification-service (Kafka consumer)
# Pré-requisito: docker-compose -f docker-compose-infra.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # hack-vp-notification — Spring Boot 4 + Kafka consumer
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: hack-vp-notification:latest
    container_name: hack-vp-notification-app
    restart: unless-stopped
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-notification-service}

      # Topics
      TOPIC_VIDEO_FAILED: ${TOPIC_VIDEO_FAILED:-video.failed.v1}
      TOPIC_VIDEO_FAILED_DLQ: ${TOPIC_VIDEO_FAILED_DLQ:-video.failed.v1.dlq}

      # Retry
      NOTIF_RETRY_MAX_ATTEMPTS: ${NOTIF_RETRY_MAX_ATTEMPTS:-3}
      NOTIF_RETRY_BACKOFF_MS: ${NOTIF_RETRY_BACKOFF_MS:-1000}

      # JVM
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC}
    ports:
      - "8080:8080"
    networks:
      - vp-network

# =============================================================================
# Rede interna isolada
# =============================================================================
networks:
  vp-network:
    external: true
